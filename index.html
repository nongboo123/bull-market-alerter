  <script>
  /* 방문 통계 (무료·무가입 Abacus). 모든 방문자 카운트↑, 표시는 ?admin=parka44(또는 #stats) 일 때만 — 나만 보기. */
  (async function(){
    const NS = 'firecoin-me-bull';
    const isAdmin = new URLSearchParams(location.search).get('admin') === 'parka44'
                 || location.hash.toLowerCase() === '#stats';
    const kst = (off) => new Date(Date.now() + 9*3600e3 - (off||0)*864e5).toISOString().slice(0,10);  // KST YYYY-MM-DD
    const J = async (u) => { try { return await (await fetch(u)).json(); } catch(e){ return null; } };
    const V = (o) => (o && (o.value != null ? o.value : o.count)) || 0;
    try{
      // 모든 방문자: 누적 + 오늘 카운트 증가
      const [total, today] = await Promise.all([
        J(`https://abacus.jasoncameron.dev/hit/${NS}/visits`),
        J(`https://abacus.jasoncameron.dev/hit/${NS}/d-${kst(0)}`),
      ]);
      const el = document.getElementById('admin-visits');
      if (!isAdmin || !el) return;
      // 관리자: 최근 7일 일별 추이(과거는 get — 증가 안 함). 일별은 오늘부터 쌓임.
      const past = await Promise.all([1,2,3,4,5,6].map(i => J(`https://abacus.jasoncameron.dev/get/${NS}/d-${kst(i)}`)));
      const days = [{ d: kst(0), n: V(today) }, ...past.map((o,i)=>({ d: kst(i+1), n: V(o) }))].reverse();
      const max = Math.max(1, ...days.map(x => x.n));
      const bars = days.map(x => {
        const h = Math.round(5 + (x.n/max)*24), t = (x.d === kst(0));
        return `<span title="${x.d}: ${x.n}" style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;margin:0 3px">`
          + `<b style="font-size:9px;color:${t?'#fbbf24':'#8a93a6'}">${x.n}</b>`
          + `<i style="width:14px;height:${h}px;border-radius:2px;background:${t?'#fbbf24':'#3b82f6'}"></i>`
          + `<b style="font-size:8px;color:#8a93a6">${x.d.slice(5)}</b></span>`;
      }).join('');
      el.innerHTML = `👁 오늘 <b>${V(today).toLocaleString()}</b> · 누적 <b>${V(total).toLocaleString()}</b> · 나만 보임`
        + `<div style="margin-top:8px;display:flex;justify-content:center;align-items:flex-end">${bars}</div>`;
    }catch(e){}
  })();
  </script>
